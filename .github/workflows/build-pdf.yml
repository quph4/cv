name: Build PDF

on:
  push:
    branches: [main]
    paths:
      - "index.html"
      - "styles/**"
      - "assets/**"
      - "scripts/build-pdf.mjs"
      - "package.json"
      - ".github/workflows/build-pdf.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Puppeteer
        run: npm install --no-audit --no-fund

      - name: Render index.html → cv.pdf
        run: npm run build:pdf

      - name: Commit cv.pdf if changed
        run: |
          if [[ -n "$(git status --porcelain cv.pdf)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add cv.pdf
            git commit -m "chore: regenerate cv.pdf"
            git push
          else
            echo "cv.pdf unchanged"
          fi
